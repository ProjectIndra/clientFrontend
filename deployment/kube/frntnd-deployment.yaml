apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-kart-frntnd
  namespace: computekart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compute-kart-frntnd
  template:
    metadata:
      labels:
        app: compute-kart-frntnd
    spec:
      containers:
        - name: frontend
          image: kumarsubrato/computekart-frontend:v0.0.3
          ports:
            - containerPort: 80