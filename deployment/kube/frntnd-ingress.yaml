apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compute-kart-frntnd-ingress
  namespace: computekart
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: computekart.com   # <-- Change this to your domain or use your cluster's IP for testing
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: compute-kart-frntnd
                port: 
                  number: 80