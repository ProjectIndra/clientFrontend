apiVersion: v1
kind: Service
metadata:
  name: compute-kart-frntnd
  namespace: computekart
spec:
  selector:
    app: compute-kart-frntnd
  ports:
    - name: TCP
      port: 80        # internal cluster port
      targetPort: 80    # container port
      nodePort: 30005   # external port for bare-metal / NodePort access
  type: NodePort